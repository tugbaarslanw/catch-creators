<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Catch Creators</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #050505;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .box {
      max-width: 900px;
      padding: 40px 24px;
    }
    .badge {
      display: inline-block;
      background: #b6ff00;
      color: #050505;
      padding: 10px 18px;
      border-radius: 999px;
      font-weight: 700;
      margin-bottom: 24px;
    }
    h1 {
      font-size: clamp(48px, 9vw, 120px);
      line-height: 0.95;
      margin: 0 0 24px;
      letter-spacing: -4px;
    }
    p {
      font-size: clamp(18px, 2vw, 24px);
      color: #d7d7d7;
      max-width: 720px;
      margin: 0 auto 32px;
      line-height: 1.5;
    }
    .buttons {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }
    a {
      text-decoration: none;
      padding: 16px 24px;
      border-radius: 999px;
      font-weight: 700;
    }
    .primary {
      background: #b6ff00;
      color: #050505;
    }
    .secondary {
      border: 1px solid #444;
      color: white;
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="badge">AI-Powered Creator Content Studio</div>
    <h1>Catch Creators</h1>
    <p>
      Creators, influencers, artists and brands için AI destekli GIF, sticker,
      face filter, AI visual, AI video ve reels content studio.
    </p>
    <div class="buttons">
      <a href="#" class="primary">Start Your Project</a>
      <a href="#" class="secondary">Explore Services</a>
    </div>
  </div>
</body>
</html>
